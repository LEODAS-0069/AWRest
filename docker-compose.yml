version: '3.8'

services:
  # MongoDB for product listings
  mongodb:
    image: mongo:6.0
    container_name: labubu_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: labubu_listings
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for chatbot query logging
  postgres:
    image: postgres:15-alpine
    container_name: labubu_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: labubu_user
      POSTGRES_PASSWORD: labubu_password
      POSTGRES_DB: labubu_chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U labubu_user']
      interval: 10s
      timeout: 5s
      retries: 5

  # LocalStack for DynamoDB simulation
  localstack:
    image: localstack/localstack:latest
    container_name: labubu_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: dynamodb
      DEBUG: 1
      DATA_DIR: /tmp/localstack/data
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - localstack_data:/tmp/localstack
    healthcheck:
      test: ['CMD', 'awslocal', 'dynamodb', 'list-tables']
      interval: 10s
      timeout: 5s
      retries: 5

  # Flask API Gateway
  flask_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.flask
    container_name: labubu_flask
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      DATABASE_URL: postgresql://labubu_user:labubu_password@postgres:5432/labubu_chatbot
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy-key}
      TORNADO_SERVICE_URL: http://tornado_service:8001
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Tornado Async Service
  tornado_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.tornado
    container_name: labubu_tornado
    ports:
      - "8001:8001"
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8001/health']
      interval: 10s
      timeout: 5s
      retries: 5

  # Gradio Chatbot Service
  chatbot_service:
    build:
      context: .
      dockerfile: docker/Dockerfile.chatbot
    container_name: labubu_chatbot
    ports:
      - "7860:7860"
    environment:
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      DATABASE_URL: postgresql://labubu_user:labubu_password@postgres:5432/labubu_chatbot
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy-key}
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7860/']
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data:
  postgres_data:
  localstack_data:

networks:
  default:
    name: labubu_network
