apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: labubu-marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
      - name: chatbot-service
        image: labubu-chatbot:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 7860
        env:
        - name: MONGO_HOST
          valueFrom:
            configMapKeyRef:
              name: labubu-config
              key: MONGO_HOST
        - name: MONGO_PORT
          valueFrom:
            configMapKeyRef:
              name: labubu-config
              key: MONGO_PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: labubu-secrets
              key: DATABASE_URL
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: labubu-secrets
              key: OPENAI_API_KEY
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 7860
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: labubu-marketplace
spec:
  selector:
    app: chatbot-service
  ports:
  - protocol: TCP
    port: 7860
    targetPort: 7860
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbot-service-hpa
  namespace: labubu-marketplace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
      - type: Percent
        value: 100
        periodSeconds: 10
      selectPolicy: Max
