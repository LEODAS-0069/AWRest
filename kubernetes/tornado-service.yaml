apiVersion: apps/v1
kind: Deployment
metadata:
  name: tornado-service
  namespace: labubu-marketplace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tornado-service
  template:
    metadata:
      labels:
        app: tornado-service
    spec:
      containers:
      - name: tornado-service
        image: labubu-tornado:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8001
        env:
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: labubu-config
              key: AWS_REGION
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: labubu-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: labubu-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: DYNAMODB_ORDERS_TABLE
          valueFrom:
            configMapKeyRef:
              name: labubu-config
              key: DYNAMODB_ORDERS_TABLE
        resources:
          requests:
            cpu: 150m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: tornado-service
  namespace: labubu-marketplace
spec:
  selector:
    app: tornado-service
  ports:
  - protocol: TCP
    port: 8001
    targetPort: 8001
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tornado-service-hpa
  namespace: labubu-marketplace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tornado-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 15
      policies:
      - type: Percent
        value: 100
        periodSeconds: 10
      selectPolicy: Max
